<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="100%" height="auto" style="background:#0d1117; border-radius:16px;">
  <title>Chorus - Ephemeral Thread Identity Illustration</title>
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="thread-a-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="thread-b-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>

  <!-- Card Frame -->
  <rect x="2" y="2" width="1196" height="436" rx="14" fill="url(#bg-grad)" stroke="#30363d" stroke-width="2"/>
  
  <!-- Grid Pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M 0,80 L 1200,80 M 0,160 L 1200,160 M 0,240 L 1200,240 M 0,320 L 1200,320 M 0,400 L 1200,400" />
    <path d="M 200,0 L 200,440 M 400,0 L 400,440 M 600,0 L 600,440 M 800,0 L 800,440 M 1000,0 L 1000,440" />
  </g>

  <!-- Left Column: Branding -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="154" height="28" rx="14" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="16" cy="14" r="4" fill="#10b981"/>
    <text x="28" y="19" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#34d399" letter-spacing="0.5">OPEN SOURCE v1.0</text>

    <text x="0" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="800" fill="#f8fafc" letter-spacing="-1">Chorus</text>
    <text x="0" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#94a3b8">Anonymous, thread-isolated discussion platform.</text>
    <text x="0" y="144" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="400" fill="#64748b">Zero profiles. Zero tracking. On-demand translation.</text>

    <g transform="translate(0, 190)">
      <rect x="0" y="0" width="90" height="32" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="45" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#00add8" text-anchor="middle">Go 1.22+</text>

      <rect x="102" y="0" width="105" height="32" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="154" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#34d399" text-anchor="middle">Clean SoC</text>

      <rect x="219" y="0" width="110" height="32" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="274" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#f43f5e" text-anchor="middle">Git Storage</text>
    </g>
  </g>

  <!-- Right Column: Visual Component -->
  <g transform="translate(580, 50)">
    <rect x="0" y="0" width="560" height="340" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <path d="M 0,12 A 12,12 0 0,1 12,0 L 548,0 A 12,12 0 0,1 560,12 L 560,40 L 0,40 Z" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <circle cx="20" cy="20" r="5" fill="#f87171"/>
    <circle cx="36" cy="20" r="5" fill="#fbbf24"/>
    <circle cx="52" cy="20" r="5" fill="#34d399"/>
    <text x="280" y="25" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">thread_isolation_specimen.go</text>

    <!-- Thread Card A -->
    <g transform="translate(24, 65)">
      <rect x="0" y="0" width="244" height="245" rx="8" fill="url(#thread-a-grad)" stroke="#334155" stroke-width="1"/>
      <rect x="14" y="14" width="216" height="26" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <text x="24" y="31" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#38bdf8">THREAD #8401</text>
      <text x="220" y="31" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="end">Active</text>

      <g transform="translate(14, 52)">
        <rect x="0" y="0" width="216" height="80" rx="6" fill="#1e293b" fill-opacity="0.6" stroke="#334155" stroke-width="1"/>
        <text x="12" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#34d399">usr_7f8a9b2c</text>
        <text x="204" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="end">12:04</text>
        <text x="12" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#cbd5e1">Is memory storage thread-safe?</text>
        <text x="12" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">Translated from EN</text>
      </g>

      <g transform="translate(14, 142)">
        <rect x="0" y="0" width="216" height="88" rx="6" fill="#1e293b" fill-opacity="0.6" stroke="#334155" stroke-width="1"/>
        <text x="12" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#fbbf24">usr_3d4e5f6a</text>
        <text x="204" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="end">12:05</text>
        <text x="12" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#cbd5e1">Yes, sync.RWMutex guarantees</text>
        <text x="12" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#cbd5e1">concurrent read/write safety.</text>
      </g>
    </g>

    <!-- Isolation Line -->
    <g transform="translate(280, 65)">
      <line x1="0" y1="20" x2="0" y2="225" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="-42" y="110" width="84" height="24" rx="12" fill="#881337" stroke="#f43f5e" stroke-width="1"/>
      <text x="0" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" font-weight="700" fill="#fecdd3" text-anchor="middle">ISOLATED</text>
    </g>

    <!-- Thread Card B -->
    <g transform="translate(292, 65)">
      <rect x="0" y="0" width="244" height="245" rx="8" fill="url(#thread-b-grad)" stroke="#374151" stroke-width="1"/>
      <rect x="14" y="14" width="216" height="26" rx="6" fill="#111827" stroke="#1f2937" stroke-width="1"/>
      <text x="24" y="31" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#a78bfa">THREAD #9102</text>
      <text x="220" y="31" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="end">Active</text>

      <g transform="translate(14, 52)">
        <rect x="0" y="0" width="216" height="80" rx="6" fill="#1f2937" fill-opacity="0.6" stroke="#374151" stroke-width="1"/>
        <text x="12" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#ec4899">usr_9a8b7c6d</text>
        <text x="204" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="end">12:10</text>
        <text x="12" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#cbd5e1">Same user, new thread ID.</text>
        <text x="12" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#64748b">No cross-thread tracking.</text>
      </g>

      <g transform="translate(14, 150)">
        <rect x="0" y="0" width="216" height="80" rx="6" fill="#065f46" fill-opacity="0.3" stroke="#059669" stroke-width="1"/>
        <text x="108" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#34d399" text-anchor="middle">Zero Global Tracking</text>
        <text x="108" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#a7f3d0" text-anchor="middle">Cryptographically Ephemeral</text>
      </g>
    </g>
  </g>
</svg>
