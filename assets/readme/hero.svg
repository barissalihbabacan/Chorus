<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" height="auto">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .border { fill: none; stroke: #21262d; stroke-width: 2; }
      .card-bg { fill: #161b22; stroke: #30363d; stroke-width: 1.5; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 48px; fill: #f0f6fc; letter-spacing: -0.04em; }
      .text-tagline { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 500; font-size: 20px; fill: #8b949e; }
      .badge-bg { fill: #1f6feb; fill-opacity: 0.15; stroke: #388bfd; stroke-width: 1.5; }
      .badge-text { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace; font-size: 13px; font-weight: 700; fill: #58a6ff; letter-spacing: 0.05em; }
      .pill-bg { fill: #21262d; stroke: #30363d; stroke-width: 1; }
      .pill-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #c9d1d9; }
      .git-node { fill: #238636; }
      .git-line { stroke: #3fb950; stroke-width: 2; stroke-dasharray: 4; }
      .code-text { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace; font-size: 14px; fill: #7ee787; }
    </style>
  </defs>

  <!-- Outer Background -->
  <rect class="bg" width="1200" height="420" rx="16" />
  <rect class="border" x="1" y="1" width="1198" height="418" rx="15" />

  <!-- Content Container -->
  <g transform="translate(60, 60)">
    <!-- Top Badge -->
    <rect class="badge-bg" x="0" y="0" width="220" height="32" rx="16" />
    <text class="badge-text" x="110" y="21" text-anchor="middle">ANONYMOUS DISCUSSION ENGINE</text>

    <!-- Main Title -->
    <text class="text-title" x="0" y="95">Chorus</text>

    <!-- Subtitle -->
    <text class="text-tagline" x="0" y="135">Identity belongs to the conversation. Not to the person.</text>

    <!-- Key Feature Pills -->
    <g transform="translate(0, 175)">
      <rect class="pill-bg" x="0" y="0" width="150" height="36" rx="18" />
      <text class="pill-text" x="75" y="23" text-anchor="middle">Zero Accounts</text>

      <rect class="pill-bg" x="162" y="0" width="190" height="36" rx="18" />
      <text class="pill-text" x="257" y="23" text-anchor="middle">Thread-Scoped Names</text>

      <rect class="pill-bg" x="364" y="0" width="180" height="36" rx="18" />
      <text class="pill-text" x="454" y="23" text-anchor="middle">Native Git Storage</text>
    </g>

    <!-- Right-Side Visual Card: Git Commit Engine Preview -->
    <g transform="translate(620, -10)">
      <rect class="card-bg" x="0" y="0" width="460" height="280" rx="12" />
      
      <!-- Card Header -->
      <path d="M0 12C0 5.37 5.37 0 12 0H448C454.63 0 460 5.37 460 12V40H0V12Z" fill="#21262d" />
      <circle cx="20" cy="20" r="6" fill="#ff5f56" />
      <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
      <circle cx="60" cy="20" r="6" fill="#27c93f" />
      <text font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" fill="#8b949e" x="80" y="24">git log --oneline --graph</text>

      <!-- Git Commit Tree -->
      <g transform="translate(24, 65)">
        <line class="git-line" x1="12" y1="12" x2="12" y2="175" />

        <!-- Commit 1 -->
        <circle class="git-node" cx="12" cy="12" r="6" />
        <text class="code-text" x="32" y="16">c19d788 <tspan fill="#f0f6fc">thread: create thd_059f40</tspan></text>
        <text font-family="sans-serif" font-size="12" fill="#8b949e" x="32" y="34">Topic: Technology | Author: River [TR]</text>

        <!-- Commit 2 -->
        <circle class="git-node" cx="12" cy="70" r="6" />
        <text class="code-text" x="32" y="74">dee2875 <tspan fill="#f0f6fc">message: append msg_111</tspan></text>
        <text font-family="sans-serif" font-size="12" fill="#8b949e" x="32" y="92">Author: Echo [JP] | "Can Git replace SQL?"</text>

        <!-- Commit 3 -->
        <circle class="git-node" cx="12" cy="128" r="6" />
        <text class="code-text" x="32" y="132">32f90ec <tspan fill="#f0f6fc">message: append msg_222</tspan></text>
        <text font-family="sans-serif" font-size="12" fill="#8b949e" x="32" y="150">Author: Stone [DE] | "Merkle DAG guarantees audit log"</text>
      </g>
    </g>
  </g>
</svg>
